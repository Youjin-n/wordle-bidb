<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Türkçe Wordle oyunu - BİDB tarafından geliştirildi. Kolay, Orta ve Zor zorluk seviyeleriyle kelimeleri tahmin et!">
  <meta name="theme-color" content="#1a1a2e">
  <title>WORDLE-BİDB</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="logo">
      <img src="logo.svg" alt="Wordle-BİDB Logo" width="32" height="32">
    </div>
    <h1>WORDLE-BİDB</h1>
  </header>

  <div id="toast-container"></div>

  <div id="zorlukEkrani">
    <div class="difficulty-title">Zorluk Seçin</div>
    <button class="zorlukBtn" data-zorluk="kolay">🟢 Kolay</button>
    <button class="zorlukBtn" data-zorluk="orta">🟡 Orta</button>
    <button class="zorlukBtn" data-zorluk="zor">🔴 Zor</button>
  </div>

  <div id="game-container">
    <div id="harf-kutusu"></div>
    <div id="klavye"></div>
    <button class="yenidenOyna" data-key="yenidenOyna">↻ Yeniden Oyna</button>
  </div>

  <!-- Statistics Modal -->
  <div id="stats-overlay">
    <div id="stats-modal">
      <h2>İSTATİSTİKLER</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-value" id="stat-played">0</span>
          <span class="stat-label">Oynanan</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-win-pct">0</span>
          <span class="stat-label">Kazanma %</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-streak">0</span>
          <span class="stat-label">Seri</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-max-streak">0</span>
          <span class="stat-label">En İyi Seri</span>
        </div>
      </div>
      <div id="distribution"></div>
      <button class="modal-btn" id="stats-close-btn">Yeniden Oyna</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 - WORDLE-BİDB</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
